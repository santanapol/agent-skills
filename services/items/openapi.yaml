openapi: 3.1.0
info:
  title: items-service
  version: 1.0.0
  description: REST API for creating items.
  contact:
    name: items-service maintainers
servers:
  - url: http://localhost:3000
    description: Internal development server
security:
  - GatewaySecret: []
tags:
  - name: items
    description: Item creation operations
  - name: health
    description: Service health probes
paths:
  /healthz:
    get:
      tags: [health]
      summary: Liveness probe
      description: Returns 200 when the process is running.
      operationId: getHealthz
      security: []
      responses:
        '200':
          description: Service is alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
  /readyz:
    get:
      tags: [health]
      summary: Readiness probe
      description: Returns 200 when dependencies such as MongoDB are ready.
      operationId: getReadyz
      security: []
      responses:
        '200':
          description: Service is ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ready
        '503':
          description: Service is not ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: not_ready
  /api/v1/items:
    post:
      tags: [items]
      summary: Create a new item
      description: Creates an item scoped to the caller OU and branch.
      operationId: createItem
      parameters:
        - $ref: '#/components/parameters/XUserOu'
        - $ref: '#/components/parameters/XUserBranch'
        - $ref: '#/components/parameters/XUserId'
        - $ref: '#/components/parameters/XUserRole'
        - $ref: '#/components/parameters/XRequestId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateItemRequest'
      responses:
        '201':
          description: Item created successfully
          headers:
            ETag:
              schema:
                type: string
              description: Weak ETag derived from upd_date
            x-request-id:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateItemSuccessResponse'
        '400':
          description: Validation or header error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Gateway authentication failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Missing user context
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Duplicate item name within tenant scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    GatewaySecret:
      type: apiKey
      in: header
      name: x-gateway-secret
  parameters:
    XUserOu:
      name: x-user-ou
      in: header
      required: true
      schema:
        type: string
        example: 665a1b2c3d4e5f6789012345
    XUserBranch:
      name: x-user-branch
      in: header
      required: true
      schema:
        type: string
        example: 665a1b2c3d4e5f6789012346
    XUserId:
      name: x-user-id
      in: header
      required: true
      schema:
        type: string
        example: user-001
    XUserRole:
      name: x-user-role
      in: header
      required: true
      schema:
        type: string
        example: admin
    XRequestId:
      name: x-request-id
      in: header
      required: false
      schema:
        type: string
        example: 9559d7f3-35f6-46de-8c15-64cceabca859
  schemas:
    CreateItemRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
          example: Widget A
        desc:
          type: string
          maxLength: 2000
          example: Optional description
    ItemData:
      type: object
      required: [id, name, desc, cr_by, cr_date, upd_by, upd_date]
      properties:
        id:
          type: string
          example: 665a1b2c3d4e5f6789012345
        name:
          type: string
        desc:
          type: string
        cr_by:
          type: string
        cr_date:
          type: string
          format: date-time
        upd_by:
          type: string
        upd_date:
          type: string
          format: date-time
    CreateItemSuccessResponse:
      type: object
      required: [success, code, message, data]
      properties:
        success:
          type: boolean
          example: true
        code:
          type: string
          example: CREATED
        message:
          type: string
          example: Item created successfully
        data:
          $ref: '#/components/schemas/ItemData'
    ErrorResponse:
      type: object
      required: [success, code, message, data, requestId]
      properties:
        success:
          type: boolean
          example: false
        code:
          type: string
          example: INVALID_PARAM
        message:
          type: string
        data:
          type: 'null'
        requestId:
          type: string
